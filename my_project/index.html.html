<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Python Foundations + Data Structures — 20-Hour Core</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>html,body{margin:0;padding:0;background:#0E1413}</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

// ---------- Design tokens: "Graphite Mint" ----------
const C = {
  bg: "#0E1413", panel: "#17201E", panel2: "#111A18", line: "#283835",
  text: "#C9D9D4", dim: "#7E968E", white: "#F2FAF7",
  mint: "#57E6B8", blue: "#5BA8F5", orange: "#F5A05A", green: "#6FE39A", red: "#F2705F", yellow: "#F0CB5E", purple: "#B79AF2",
};
const mono = "'Cascadia Code', 'Cascadia Mono', Consolas, 'Courier New', monospace";
const sans = "'Segoe UI Variable Text', 'Segoe UI', system-ui, sans-serif";

// ---------- Building blocks ----------
const Kbd = ({ children }) => (
  <code style={{ fontFamily: mono, background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 6, padding: "1px 7px", color: C.mint, fontSize: 13 }}>{children}</code>
);

const Code = ({ code, title, note }) => {
  const [copied, setCopied] = useState(false);
  const copy = () => {
    const ta = document.createElement("textarea");
    ta.value = code; document.body.appendChild(ta); ta.select();
    try { document.execCommand("copy"); } catch (e) {}
    document.body.removeChild(ta);
    setCopied(true); setTimeout(() => setCopied(false), 1400);
  };
  return (
    <div style={{ margin: "10px 0" }}>
      <div style={{ background: "#0A0F0E", border: `1px solid ${C.line}`, borderRadius: 8, overflow: "hidden" }}>
        <div onClick={copy} style={{ display: "flex", justifyContent: "space-between", padding: "6px 14px", borderBottom: `1px solid ${C.line}`, cursor: "pointer" }}>
          <span style={{ fontFamily: mono, fontSize: 11.5, color: C.yellow }}>{title || "python — try it in the REPL"}</span>
          <span style={{ fontFamily: mono, fontSize: 11, color: copied ? C.green : C.dim }}>{copied ? "copied ✓" : "copy"}</span>
        </div>
        <pre style={{ fontFamily: mono, fontSize: 12.5, color: C.text, margin: 0, padding: "11px 14px", overflowX: "auto", lineHeight: 1.6 }}>{code}</pre>
      </div>
      {note && <div style={{ fontSize: 12.5, color: C.dim, marginTop: 4, paddingLeft: 4, lineHeight: 1.5 }}>{note}</div>}
    </div>
  );
};

const CH = ({ children }) => <h3 style={{ fontFamily: sans, fontWeight: 700, fontSize: 16.5, color: C.white, margin: "20px 0 4px" }}>{children}</h3>;
const P = ({ children, style }) => <p style={{ fontSize: 14, lineHeight: 1.65, color: C.text, margin: "8px 0", ...style }}>{children}</p>;
const Tip = ({ children, color = C.yellow, icon = "💡" }) => (
  <div style={{ borderLeft: `3px solid ${color}`, background: `${color}0A`, borderRadius: "0 8px 8px 0", padding: "9px 13px", margin: "10px 0", fontSize: 13.5, lineHeight: 1.6, color: C.text }}>{icon} {children}</div>
);

// ---------- Quiz ----------
function Quiz({ questions }) {
  const [answers, setAnswers] = useState({});
  const score = questions.filter((q, i) => answers[i] === q.c).length;
  const all = Object.keys(answers).length === questions.length;
  return (
    <div>
      {questions.map((q, i) => (
        <div key={i} style={{ background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 12, padding: 14, marginBottom: 10 }}>
          <div style={{ fontSize: 14, fontWeight: 600, color: C.white, marginBottom: 8, lineHeight: 1.5, fontFamily: q.mono ? mono : sans }}>{i + 1}. {q.q}</div>
          {q.a.map((opt, j) => {
            const picked = answers[i] === j, show = answers[i] !== undefined, right = j === q.c;
            let border = C.line, bg = "transparent", col = C.text;
            if (show && picked && right) { border = C.green; bg = `${C.green}14`; col = C.green; }
            else if (show && picked) { border = C.red; bg = `${C.red}14`; col = C.red; }
            else if (show && right) { border = `${C.green}66`; col = C.green; }
            return <div key={j} onClick={() => answers[i] === undefined && setAnswers({ ...answers, [i]: j })} style={{ border: `1px solid ${border}`, background: bg, color: col, borderRadius: 8, padding: "7px 12px", marginBottom: 6, fontSize: 13.5, cursor: answers[i] === undefined ? "pointer" : "default", lineHeight: 1.5, fontFamily: mono }}>{opt}</div>;
          })}
          {answers[i] !== undefined && q.why && <div style={{ fontSize: 12.5, color: C.dim, marginTop: 6, lineHeight: 1.55 }}>→ {q.why}</div>}
        </div>
      ))}
      {all && (
        <div style={{ textAlign: "center", padding: 11, border: `1.5px solid ${C.green}66`, borderRadius: 12, background: `${C.green}0D`, fontFamily: mono, fontSize: 13.5, color: C.green }}>
          recap check: {score}/{questions.length} ✓
        </div>
      )}
    </div>
  );
}

// ---------- Practice question card (attempt → hint → solution) ----------
function Question({ p, grade, setGrade }) {
  const [stage, setStage] = useState(0);
  const diffColor = { Warmup: C.blue, Classic: C.mint, Famous: C.yellow, Challenge: C.orange }[p.diff] || C.blue;
  const grades = [
    { k: "solo", label: "✅ solved myself", color: C.green },
    { k: "hint", label: "🟡 needed hint", color: C.yellow },
    { k: "read", label: "🔴 read solution", color: C.red },
  ];
  return (
    <div style={{ background: C.panel2, border: `1px solid ${grade ? (grades.find(g => g.k === grade).color + "66") : C.line}`, borderRadius: 14, padding: 16, margin: "12px 0" }}>
      <div style={{ display: "flex", alignItems: "baseline", gap: 10, flexWrap: "wrap", marginBottom: 6 }}>
        <span style={{ fontFamily: sans, fontSize: 15.5, fontWeight: 700, color: C.white }}>{p.title}</span>
        <span style={{ fontFamily: mono, fontSize: 10.5, color: diffColor, border: `1px solid ${diffColor}55`, borderRadius: 999, padding: "2px 9px" }}>{p.diff}</span>
        {p.src && <span style={{ fontFamily: mono, fontSize: 11, color: C.dim }}>{p.src}</span>}
      </div>
      <p style={{ fontSize: 13.5, lineHeight: 1.6, color: C.text, margin: "4px 0" }}>{p.statement}</p>
      {p.example && <pre style={{ fontFamily: mono, fontSize: 12, color: C.dim, background: "#0A0F0E", border: `1px solid ${C.line}`, borderRadius: 8, padding: "8px 12px", margin: "8px 0", overflowX: "auto", lineHeight: 1.6 }}>{p.example}</pre>}
      <div style={{ display: "flex", gap: 8, flexWrap: "wrap", margin: "10px 0 2px" }}>
        {stage < 1 && <button onClick={() => setStage(1)} style={{ fontFamily: mono, fontSize: 11.5, fontWeight: 700, padding: "7px 13px", borderRadius: 8, cursor: "pointer", border: `1px solid ${C.yellow}66`, background: `${C.yellow}12`, color: C.yellow }}>🔓 hint</button>}
        {stage >= 1 && stage < 2 && <button onClick={() => setStage(2)} style={{ fontFamily: mono, fontSize: 11.5, fontWeight: 700, padding: "7px 13px", borderRadius: 8, cursor: "pointer", border: `1px solid ${C.mint}66`, background: `${C.mint}12`, color: C.mint }}>📖 solution</button>}
        {stage === 0 && <span style={{ fontFamily: mono, fontSize: 10.5, color: C.dim, alignSelf: "center" }}>write it in the REPL first</span>}
      </div>
      {stage >= 1 && <div style={{ animation: "rise .3s both", borderLeft: `3px solid ${C.yellow}`, background: `${C.yellow}08`, borderRadius: "0 8px 8px 0", padding: "8px 12px", margin: "8px 0", fontSize: 13, color: C.text, lineHeight: 1.6 }}>💛 {p.hint}</div>}
      {stage >= 2 && <div style={{ animation: "rise .3s both" }}><Code title={p.complexity ? `solution — ${p.complexity}` : "solution"} code={p.code} note={p.note} /></div>}
      <div style={{ display: "flex", gap: 6, flexWrap: "wrap", marginTop: 8, alignItems: "center" }}>
        <span style={{ fontFamily: mono, fontSize: 10.5, color: C.dim }}>self-grade:</span>
        {grades.map(g => (
          <button key={g.k} onClick={() => setGrade(g.k)} style={{ fontFamily: mono, fontSize: 10.5, padding: "4px 9px", borderRadius: 999, cursor: "pointer", border: `1px solid ${grade === g.k ? g.color : C.line}`, background: grade === g.k ? `${g.color}18` : "transparent", color: grade === g.k ? g.color : C.dim }}>{g.label}</button>
        ))}
      </div>
    </div>
  );
}

// ---------- Recap box ----------
const Recap = ({ items }) => (
  <div style={{ background: `${C.mint}08`, border: `1.5px solid ${C.mint}44`, borderRadius: 14, padding: "14px 17px", margin: "18px 0 10px" }}>
    <div style={{ fontFamily: mono, fontSize: 11.5, letterSpacing: "0.14em", color: C.mint, marginBottom: 8 }}>📌 RECAP — IF YOU REMEMBER NOTHING ELSE</div>
    {items.map((it, i) => (
      <div key={i} style={{ display: "flex", gap: 10, padding: "4px 0", fontSize: 13.5, lineHeight: 1.6, color: C.text }}>
        <span style={{ color: C.mint, flexShrink: 0 }}>{i + 1}.</span><span>{it}</span>
      </div>
    ))}
  </div>
);

// ---------- SESSIONS (16 × ~75 min = 20 hrs) ----------
function buildSessions() {
  return [
    // ========== 1 ==========
    {
      title: "Start here: variables, types & I/O", icon: "🚀", part: "PYTHON BASICS",
      concepts: (
        <>
          <CH>Setup (5 min, once)</CH>
          <Code title="PowerShell" code={"winget install -e --id Python.Python.3.12\npython        # opens the REPL — where you'll live for this course"} note="Type code, press Enter, see the result instantly. Exit with exit(). Every session runs here or in a scratch .py file." />
          <CH>Variables — names stuck onto values</CH>
          <Code code={'age = 25            # int\nprice = 19.99        # float\nname = "Ada"         # str\nis_open = True       # bool\ntype(price)          # <class \'float\'> — ask anything its type'} note="No declarations, no type keywords. A variable is created the moment you assign to it, and can be reassigned to anything." />
          <CH>Operators & conversion</CH>
          <Code code={"7 / 2      # 3.5   true division — always float\n7 // 2     # 3     floor division\n7 % 2      # 1     remainder (modulo) — even/odd checks, wrap-around\n2 ** 10    # 1024  power\nint(\"42\") + 1      # 43 — str to int\nstr(42) + \"!\"       # '42!' — int to str; mixing them raises TypeError"} note="% and // will follow you through every data-structures problem — learn them now." />
          <CH>Input & output</CH>
          <Code code={'name = input("Your name: ")     # ALWAYS returns a string\nage = int(input("Age: "))        # convert immediately if you need a number\nprint(f"Hi {name}, next year you\'ll be {age + 1}")'} note="f-strings — f'text {expr}' — are the modern way to build output; expressions run right inside the braces." />
        </>
      ),
      problems: [
        { title: "Swap without a temp variable", diff: "Classic", statement: "a = 5, b = 9. Swap their values in ONE line, no third variable.", hint: "Python assigns right side to left side simultaneously — what if both sides had two names?", code: "a, b = 5, 9\na, b = b, a\nprint(a, b)    # 9 5", note: "Tuple unpacking — an idiom you'll use constantly, including inside algorithms later.", grade: true },
        { title: "Temperature converter", diff: "Warmup", statement: "Read a Celsius value with input() and print it in Fahrenheit (F = C × 9/5 + 32), nicely formatted to 1 decimal place.", hint: "input() gives a string → float() it. f-strings format decimals with {value:.1f}.", code: 'c = float(input("Celsius: "))\nf = c * 9 / 5 + 32\nprint(f"{c}°C = {f:.1f}°F")', note: "{f:.1f} = format to 1 decimal. The convert-compute-format pipeline is 90% of beginner scripts." },
        { title: "Digital clock math", diff: "Warmup", statement: "Given total_seconds = 7385, print it as h:m:s (2:03:05 → 2 h, 3 m, 5 s) using only // and %.", hint: "hours = seconds // 3600. What's LEFT after removing the hours? That's % 3600.", code: "total = 7385\nh = total // 3600\nm = (total % 3600) // 60\ns = total % 60\nprint(f\"{h}h {m}m {s}s\")   # 2h 3m 5s", note: "The divide-and-remainder pattern: peel off the biggest unit with //, keep the rest with %." },
      ],
      recap: [
        "Variables are created by assignment; type() tells you what anything is.",
        "/ gives float, // floors, % gives remainder, ** is power — // and % are algorithm workhorses.",
        "input() ALWAYS returns str — convert with int()/float() immediately.",
        "f-strings: f\"text {expression}\" — with {x:.2f} for decimal formatting.",
        "a, b = b, a — simultaneous assignment; no temp variable ever needed.",
      ],
      quiz: [
        { q: "print(10 / 5) shows…", a: ["2", "2.0 — / always returns a float", "error"], c: 1 },
        { q: "input('n: ') + 1 crashes because…", a: ["input failed", "input() returned a str, and str + int is a TypeError", "1 must be quoted"], c: 1 },
      ],
    },
    // ========== 2 ==========
    {
      title: "Strings", icon: "🔤", part: "PYTHON BASICS",
      concepts: (
        <>
          <CH>Indexing & slicing — the grammar of sequences</CH>
          <Code code={'s = "python"\ns[0]       # \'p\'   first\ns[-1]      # \'n\'   last (negatives count from the end)\ns[1:4]     # \'yth\' — start included, stop EXCLUDED\ns[:3]      # \'pyt\'  from the beginning\ns[::2]     # \'pto\'  every 2nd char\ns[::-1]    # \'nohtyp\' — reversed'} note="Memorize s[start:stop:step]. The exact same syntax runs lists, tuples, and more — learn it once here." />
          <CH>The methods you'll actually use</CH>
          <Code code={'s = "  Hello World  "\ns.strip()            # \'Hello World\' — trim whitespace\ns.lower(), s.upper()\ns.replace("l", "L")\n"World" in s          # True — substring check\ns.strip().split(" ")  # [\'Hello\', \'World\']\n"-".join(["a","b","c"])  # \'a-b-c\'\n"abc".isalpha(), "42".isdigit()'} note="split breaks a string into a list; join glues a list into a string. They're inverses — you'll use both weekly forever." />
          <CH>Immutability — the one rule</CH>
          <Code code={'s = "cat"\n# s[0] = "b"        # TypeError! strings can NEVER change in place\ns = "b" + s[1:]      # make a NEW string instead: \'bat\''} note="Every string method returns a NEW string. Building a big string in a loop with +=? Collect pieces in a list, then ''.join(pieces) once." />
        </>
      ),
      problems: [
        { title: "Count the vowels", diff: "Classic", statement: "Write count_vowels(s) → how many of a e i o u appear in s (any case). count_vowels('Beautiful') → 5.", hint: "Loop over the string (for ch in s), lowercase each char, check membership: ch in 'aeiou'.", code: 'def count_vowels(s):\n    count = 0\n    for ch in s.lower():\n        if ch in "aeiou":\n            count += 1\n    return count\n\nprint(count_vowels("Beautiful"))   # 5', note: "for ch in s walks a string character by character — strings are sequences like everything else." },
        { title: "Valid Palindrome", diff: "Famous", src: "LeetCode #125 (simplified)", statement: "Return True if a string reads the same forwards and backwards, ignoring case and spaces. 'Never odd or even' → True.", hint: "Clean it first (lowercase, remove spaces), then compare against one slicing trick from above.", code: 'def is_palindrome(s):\n    cleaned = s.lower().replace(" ", "")\n    return cleaned == cleaned[::-1]\n\nprint(is_palindrome("Never odd or even"))   # True', note: "Clean-then-check: normalize the input first and the actual logic collapses to one line." },
        { title: "Initials extractor", diff: "Warmup", statement: "Turn 'ada  grace lovelace' into 'A.G.L.' — handle extra spaces and any capitalization.", hint: "split() with NO argument eats repeated spaces for free. Grab word[0] from each piece.", code: 'def initials(name):\n    parts = name.split()          # no-arg split handles messy spacing\n    letters = [w[0].upper() for w in parts]\n    return ".".join(letters) + "."\n\nprint(initials("ada  grace lovelace"))   # A.G.L.', note: "split() → transform each piece → join back: the universal string-processing pipeline." },
      ],
      recap: [
        "s[start:stop:step] — stop excluded, negatives from the end, [::-1] reverses.",
        "Strings are IMMUTABLE: every method returns a new string; s[0] = 'x' is illegal.",
        "split() breaks into a list (no-arg version handles messy whitespace); join() glues back.",
        "'sub' in s for substring checks; strip/lower/replace cover most cleaning.",
        "Pipeline habit: normalize → transform pieces → reassemble.",
      ],
      quiz: [
        { q: "\"hello\"[1:3] is…", a: ["'ell'", "'el' — index 3 is excluded", "'hel'"], c: 1 },
        { q: "s.upper() changes s itself?", a: ["yes", "no — strings are immutable; it returns a NEW string you must assign", "only for ASCII"], c: 1 },
      ],
    },
    // ========== 3 ==========
    {
      title: "Conditionals & truthiness", icon: "🔀", part: "PYTHON BASICS",
      concepts: (
        <>
          <CH>if / elif / else — indentation IS the syntax</CH>
          <Code code={'score = 87\nif score >= 90:\n    grade = "A"\nelif score >= 80:      # checked only if the first was False\n    grade = "B"\nelse:\n    grade = "C"\nprint(grade)            # B'} note="4 spaces of indentation define the block — no braces. elif chains stop at the FIRST true branch." />
          <CH>Combining conditions</CH>
          <Code code={"age, has_id = 20, True\nage >= 18 and has_id     # both must hold\nage < 13 or age > 65      # either\nnot has_id                # flip\n13 <= age <= 19           # chained comparison — Python exclusive!"} note="and/or/not are spelled as words. Chained comparisons (a < b < c) read like math and work like it." />
          <CH>Truthiness — what counts as False</CH>
          <Code code={'# Falsy: 0, 0.0, "", [], {}, set(), None, False — everything else is truthy\nitems = []\nif not items:\n    print("empty!")\n\nname = ""\ngreeting = name or "stranger"    # or returns the first truthy operand\nprint(greeting)                   # stranger'} note="'if items:' is the idiomatic non-empty check. 'x or default' is the classic fallback pattern." />
          <CH>One-line form</CH>
          <Code code={'label = "even" if n % 2 == 0 else "odd"'} note="The conditional expression — value-picker, not statement. Use it when it fits on one readable line." />
        </>
      ),
      problems: [
        { title: "FizzBuzz", diff: "Famous", src: "the most famous screening question ever", statement: "For numbers 1–15: print 'FizzBuzz' if divisible by both 3 and 5, 'Fizz' if by 3, 'Buzz' if by 5, else the number.", hint: "Order matters! Check the 'both' case FIRST — or 15 gets caught by the 3-check before you reach it.", code: 'for n in range(1, 16):\n    if n % 15 == 0:\n        print("FizzBuzz")\n    elif n % 3 == 0:\n        print("Fizz")\n    elif n % 5 == 0:\n        print("Buzz")\n    else:\n        print(n)', note: "The lesson isn't loops — it's branch ORDER: most-specific condition first, because elif stops at the first hit." },
        { title: "Leap year", diff: "Classic", statement: "A year is a leap year if divisible by 4 — EXCEPT century years, which must be divisible by 400. 2024 ✓, 1900 ✗, 2000 ✓.", hint: "Translate the rule literally: (div by 4 AND not div by 100) OR (div by 400).", code: "def is_leap(y):\n    return (y % 4 == 0 and y % 100 != 0) or y % 400 == 0\n\nprint(is_leap(2024), is_leap(1900), is_leap(2000))  # True False True", note: "Returning a boolean expression directly — no 'if cond: return True else: return False' padding, ever." },
        { title: "Max of three (no max())", diff: "Warmup", statement: "Write biggest(a, b, c) using only if/elif logic.", hint: "Start by assuming a wins; let b and c challenge the champion.", code: "def biggest(a, b, c):\n    best = a\n    if b > best:\n        best = b\n    if c > best:\n        best = c\n    return best", note: "The 'running champion' shape — the same pattern will find max/min in ANY collection in session 4." },
      ],
      recap: [
        "Indentation defines blocks; elif chains stop at the first True — order from most to least specific.",
        "and / or / not as words; chained a < b < c works like math.",
        "Falsy: 0, empty containers, '', None, False. 'if items:' = non-empty check.",
        "'x or default' returns the first truthy value — the fallback idiom.",
        "Return boolean expressions directly; 'val_if if cond else val_else' for one-line picks.",
      ],
      quiz: [
        { q: "if []: print('yes') prints…", a: ["yes", "nothing — an empty list is falsy", "error"], c: 1 },
        { q: "In FizzBuzz, checking n % 3 before n % 15…", a: ["is fine", "breaks it — 15 matches the 3-branch first and 'FizzBuzz' never prints", "is faster"], c: 1 },
      ],
    },
    // ========== 4 ==========
    {
      title: "Loops", icon: "🔁", part: "PYTHON BASICS",
      concepts: (
        <>
          <CH>for — iterate over anything</CH>
          <Code code={'for ch in "abc":          # strings\n    print(ch)\nfor n in [10, 20, 30]:     # lists\n    print(n)\nfor i in range(5):         # 0 1 2 3 4  (stop excluded, like slices)\n    print(i)\nrange(2, 10, 2)             # 2 4 6 8 — start, stop, step'} note="Python's for is 'for each'. You almost never manage an index by hand." />
          <CH>enumerate & the accumulator pattern</CH>
          <Code code={'total = 0\nfor price in [4, 9, 2]:\n    total += price          # accumulator: start empty, add each pass\n\nfor i, ch in enumerate("abc"):   # need the index too? enumerate.\n    print(i, ch)                  # 0 a · 1 b · 2 c'} note="Accumulators (sum, count, best-so-far) are half of all beginner loop problems. enumerate replaces range(len(x)) forever." />
          <CH>while, break, continue</CH>
          <Code code={'n = 1\nwhile n < 100:          # loop while a condition holds\n    n *= 2\nprint(n)                 # 128\n\nwhile True:              # loop-until pattern\n    cmd = input("> ")\n    if cmd == "quit":\n        break             # exit the loop entirely\n    if cmd == "":\n        continue          # skip to the next iteration'} note="for = known collection/count; while = unknown, condition-driven. while True + break is the standard input-loop shape." />
        </>
      ),
      problems: [
        { title: "Sum of digits", diff: "Classic", statement: "digit_sum(4729) → 22. Use // and % from session 1 — no string conversion.", hint: "n % 10 hands you the last digit. n // 10 removes it. Repeat while n > 0.", code: "def digit_sum(n):\n    total = 0\n    while n > 0:\n        total += n % 10     # grab last digit\n        n //= 10             # chop it off\n    return total\n\nprint(digit_sum(4729))   # 22", note: "The peel-digits-with-%-and-// loop appears in dozens of number problems (reverse integer, palindromic numbers…)." },
        { title: "Fibonacci, first n terms", diff: "Famous", statement: "Print the first n Fibonacci numbers: 0 1 1 2 3 5 8 … (each = sum of previous two).", hint: "Keep just TWO variables and slide them forward with the tuple swap from session 1.", code: "def fib(n):\n    a, b = 0, 1\n    for _ in range(n):\n        print(a, end=\" \")\n        a, b = b, a + b\n\nfib(8)   # 0 1 1 2 3 5 8 13", note: "_ is the convention for a loop variable you don't use. This rolling-pair shape returns as the core of dynamic programming in session 16." },
        { title: "Guessing game", diff: "Warmup", statement: "Pick secret = 7. Ask the user for guesses in a loop, print 'higher'/'lower', stop with 'got it in N tries!'.", hint: "while True + break when correct. Count attempts with an accumulator.", code: 'secret, tries = 7, 0\nwhile True:\n    guess = int(input("guess: "))\n    tries += 1\n    if guess == secret:\n        print(f"got it in {tries} tries!")\n        break\n    print("higher" if guess < secret else "lower")', note: "Every interactive CLI program is this loop. Note the one-line conditional doing the hint." },
      ],

        { title: "Merge Two Sorted Lists (array version)", diff: "Famous", src: "LeetCode #88's core", statement: "Merge two already-sorted lists into one sorted list in O(n + m) — no calling sorted() on the combination.", hint: "Two pointers, one per list; repeatedly take the smaller front; append the survivor's leftovers.", code: "def merge(a, b):\n    i = j = 0\n    out = []\n    while i < len(a) and j < len(b):\n        if a[i] <= b[j]:\n            out.append(a[i]); i += 1\n        else:\n            out.append(b[j]); j += 1\n    out.extend(a[i:])          # one of these is empty\n    out.extend(b[j:])\n    return out\n\nprint(merge([1, 4, 7], [2, 3, 9]))   # [1, 2, 3, 4, 7, 9]", note: "This merge is the beating heart of merge sort AND the linked-list version (LeetCode #21). Two pointers strike again.", complexity: "O(n + m)" },
        { title: "Squares of a Sorted Array", diff: "Famous", src: "LeetCode #977 — the graduation exercise", statement: "Given a sorted array (may include negatives), return the squares in sorted order in O(n). [-4,-1,0,3,10] → [0,1,9,16,100]. Squaring breaks the order (16 > 9!) — sorting after costs O(n log n). Beat it.", hint: "The LARGEST square is at one of the two ENDS (biggest absolute value). Two pointers, fill the answer from the back.", code: "def sorted_squares(nums):\n    n = len(nums)\n    out = [0] * n\n    left, right = 0, n - 1\n    for i in range(n - 1, -1, -1):        # fill from the back\n        if abs(nums[left]) > abs(nums[right]):\n            out[i] = nums[left] ** 2\n            left += 1\n        else:\n            out[i] = nums[right] ** 2\n            right -= 1\n    return out\n\nprint(sorted_squares([-4, -1, 0, 3, 10]))   # [0, 1, 9, 16, 100]", note: "Everything converges: two pointers (S5/14), exploiting sortedness (this session), complexity judgment (S12), range stepping (S4). If this one clicked, the course worked.", complexity: "O(n)" },
      ],
      recap: [
        "Binary search: sorted + while left <= right + mid ±1 — O(log n), template from memory.",
        "Real sorting = sorted()/.sort() with key=; implement bubble once only to feel O(n²).",
        "Sort-then-sweep: pay O(n log n) once to unlock O(n) passes (adjacent dups, meeting pointers).",
        "Merging two sorted sequences with two pointers is O(n+m) — the soul of merge sort.",
        "When stuck: 'what if it were sorted?' and 'can a dict/set replace this inner search?' solve a shocking fraction of problems.",
      ],
      quiz: [
        { q: "left = mid + 1 (not left = mid) matters because…", a: ["readability", "with a 2-element window mid equals left; without +1 the window never shrinks — infinite loop", "negative indexes"], c: 1 },
        { q: "Squares-of-sorted in O(n) works because…", a: ["squaring is fast", "the largest square must sit at one END of the array — two pointers harvest from the outside in", "Python caches squares"], c: 1 },
      ],
      final: true,
    },
  ];
}

// ---------- Grand map for the finale ----------
const GRAND = [
  ["S1-4", "variables · strings · branching · loops — the sentence-level grammar"],
  ["S5-7", "list / tuple / set / dict — pick by job: order · record · membership · lookup"],
  ["S8-9", "functions + comprehensions — name logic, transform collections in one line"],
  ["S10-11", "errors, files, classes — robust programs and custom types (Node!)"],
  ["S12", "Big-O — the lens: in on a list O(n), on a set O(1); nested loops O(n²)"],
  ["S13", "stack = most-recent-first · queue(deque) = arrival order"],
  ["S14", "linked lists — traversal walk · save-next-first · dummy head · fast/slow"],
  ["S15", "recursion (base + smaller call) · tree template · DFS deep / BFS wide"],
  ["S16", "binary search template · sorted()+key · sort-then-sweep · two-pointer merge"],
];

// ---------- Main ----------
function Foundations() {
  const [step, setStep] = useState(0);
  const [visited, setVisited] = useState({ 0: true });
  const [showToc, setShowToc] = useState(true);
  const [grades, setGrades] = useState({});
  const topRef = useRef(null);
  const sessions = buildSessions();
  const go = (i) => {
    if (i < 0 || i >= sessions.length) return;
    setStep(i); setVisited(v => ({ ...v, [i]: true })); setShowToc(false);
    topRef.current?.scrollIntoView({ behavior: "smooth" });
  };
  const totalQ = sessions.reduce((a, s) => a + s.problems.length, 0);
  const graded = Object.values(grades);
  const s = sessions[step];
  const basicsCount = sessions.filter(x => x.part === "PYTHON BASICS").length;

  return (
    <div style={{ minHeight: "100vh", background: C.bg, fontFamily: sans, color: C.text }}>
      <style>{`
        @keyframes rise { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: none; } }
        @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-5px); } }
        @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
        button:focus-visible, input:focus-visible { outline: 2px solid ${C.mint}; outline-offset: 2px; }
        ::-webkit-scrollbar { width: 8px; height: 8px; } ::-webkit-scrollbar-thumb { background: ${C.line}; border-radius: 8px; }
      `}</style>
      <div ref={topRef} />

      <header style={{ maxWidth: 800, margin: "0 auto", padding: "30px 20px 8px" }}>
        <div style={{ display: "flex", alignItems: "center", gap: 14, flexWrap: "wrap" }}>
          <div style={{ animation: "bob 3.5s ease-in-out infinite", fontSize: 34 }}>🌱</div>
          <div style={{ flex: 1 }}>
            <h1 style={{ margin: 0, fontSize: 23, fontWeight: 800, color: C.white, letterSpacing: "-0.02em" }}>Python Foundations + Data Structures</h1>
            <div style={{ fontFamily: mono, fontSize: 12, color: C.dim }}>16 sessions × ~75 min = 20 hrs · concepts → questions → recap · basics first, DS after</div>
          </div>
          <button onClick={() => setShowToc(!showToc)} style={{ fontFamily: mono, fontSize: 12, padding: "8px 14px", borderRadius: 8, cursor: "pointer", border: `1px solid ${C.line}`, background: showToc ? `${C.mint}18` : "transparent", color: showToc ? C.mint : C.dim }}>{showToc ? "hide plan" : "plan"}</button>
        </div>
        <div style={{ display: "flex", gap: 4, marginTop: 16 }}>
          {sessions.map((m, i) => (
            <button key={i} onClick={() => go(i)} title={m.title} aria-label={`Session ${i + 1}: ${m.title}`} style={{ flex: 1, height: 20, borderRadius: 4, cursor: "pointer", border: "none", background: i === step ? C.mint : visited[i] ? `${C.blue}55` : C.panel, boxShadow: i === step ? `0 0 0 1.5px ${C.mint}` : `inset 0 0 0 1px ${i < basicsCount ? C.line : C.purple + "55"}`, transition: "background .25s" }} />
          ))}
        </div>
        <div style={{ fontFamily: mono, fontSize: 11, color: C.dim, marginTop: 5 }}>
          session {step + 1}/{sessions.length} · {s.part} · hour {(step * 1.25).toFixed(2).replace(".00","")}–{((step + 1) * 1.25).toFixed(2).replace(".00","")} of 20
          {graded.length > 0 && <span> · questions graded {graded.length}/{totalQ} ({graded.filter(g => g === "solo").length} solo ✅)</span>}
        </div>
      </header>

      {showToc && (
        <nav style={{ maxWidth: 800, margin: "0 auto", padding: "8px 20px" }}>
          {["PYTHON BASICS", "DATA STRUCTURES"].map(part => (
            <div key={part}>
              <div style={{ fontFamily: mono, fontSize: 11, letterSpacing: "0.16em", color: part === "PYTHON BASICS" ? C.mint : C.purple, margin: "12px 2px 6px" }}>{part}</div>
              <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(230px, 1fr))", gap: 8 }}>
                {sessions.map((m, i) => m.part === part && (
                  <button key={i} onClick={() => go(i)} style={{ textAlign: "left", background: i === step ? `${C.mint}14` : C.panel, border: `1px solid ${i === step ? C.mint + "88" : C.line}`, borderRadius: 10, padding: "9px 12px", cursor: "pointer" }}>
                    <div style={{ fontSize: 13.5, color: C.white, fontWeight: 600, fontFamily: sans }}>{m.icon} S{i + 1} · {m.title}</div>
                    <div style={{ fontFamily: mono, fontSize: 10.5, color: visited[i] ? C.green : C.dim, marginTop: 3 }}>{visited[i] ? "✓ " : ""}~75 min · {m.problems.length} questions</div>
                  </button>
                ))}
              </div>
            </div>
          ))}
        </nav>
      )}

      <main style={{ maxWidth: 800, margin: "0 auto", padding: "14px 20px 30px" }}>
        <div key={step} style={{ background: C.panel, border: `1px solid ${C.line}`, borderRadius: 16, padding: "24px 22px", animation: "rise .35s both" }}>
          <div style={{ fontFamily: mono, fontSize: 11, letterSpacing: "0.14em", color: s.part === "PYTHON BASICS" ? C.mint : C.purple, marginBottom: 6 }}>{s.icon} SESSION {step + 1} · {s.part} · ~75 MIN</div>
          <h2 style={{ fontFamily: sans, fontWeight: 700, fontSize: 25, color: C.white, margin: "0 0 2px", letterSpacing: "-0.02em" }}>{s.title}</h2>

          {/* concepts */}
          {s.concepts}

          {/* questions */}
          <h3 style={{ fontFamily: sans, fontWeight: 700, fontSize: 17, color: C.orange, margin: "26px 0 4px" }}>❓ Questions — attempt in the REPL before any reveal</h3>
          {s.problems.map((p, pi) => (
            <Question key={pi} p={p}
              grade={grades[`${step}-${pi}`]}
              setGrade={(g) => setGrades(prev => ({ ...prev, [`${step}-${pi}`]: g }))} />
          ))}

          {/* recap */}
          <Recap items={s.recap} />
          <Quiz questions={s.quiz} />

          {s.final && (
            <>
              <h3 style={{ fontFamily: sans, fontWeight: 700, fontSize: 17, color: C.mint, margin: "26px 0 6px" }}>🗺️ The whole course on one screen</h3>
              <div style={{ background: C.panel2, border: `1px solid ${C.line}`, borderRadius: 12, padding: "8px 14px" }}>
                {GRAND.map(([ses, d], i) => (
                  <div key={i} style={{ display: "flex", gap: 12, padding: "7px 0", borderBottom: i < GRAND.length - 1 ? `1px solid ${C.line}55` : "none", alignItems: "baseline", flexWrap: "wrap" }}>
                    <code style={{ fontFamily: mono, fontSize: 12, fontWeight: 700, color: C.mint, minWidth: 52 }}>{ses}</code>
                    <span style={{ fontSize: 13, color: C.text, lineHeight: 1.55, flex: 1 }}>{d}</span>
                  </div>
                ))}
              </div>
              <P style={{ fontSize: 13.5 }}>Finishing move: re-attempt every question you graded 🟡/🔴 from a blank REPL — solving twice beats reading five new ones. After that, you're ready for the <b style={{ color: C.white }}>80/20 interview sprint</b> (deeper patterns: sliding window, monotonic stacks, DP) or the <b style={{ color: C.white }}>Data Science track</b> — everything there builds directly on sessions 5–9.</P>
            </>
          )}
        </div>

        <div style={{ display: "flex", justifyContent: "space-between", marginTop: 16 }}>
          <button onClick={() => go(step - 1)} disabled={step === 0} style={{ fontFamily: mono, fontSize: 13, padding: "10px 18px", borderRadius: 8, border: `1px solid ${C.line}`, background: "transparent", color: step === 0 ? C.line : C.dim, cursor: step === 0 ? "default" : "pointer" }}>← back</button>
          {step < sessions.length - 1 ? (
            <button onClick={() => go(step + 1)} style={{ fontFamily: mono, fontSize: 13, fontWeight: 700, padding: "10px 22px", borderRadius: 8, border: "none", background: C.mint, color: "#06201A", cursor: "pointer" }}>next session →</button>
          ) : (
            <span style={{ fontFamily: mono, fontSize: 13, color: C.green, alignSelf: "center" }}>🌱 → 🌳 complete</span>
          )}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<Foundations />);
</script>
</body>
</html>
